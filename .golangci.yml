version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - revive
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
